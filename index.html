<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgammon Game</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .board { display: grid; grid-template-columns: repeat(24, 1fr); border: 2px solid #333; }
        .point { width: 30px; height: 60px; border: 1px solid #999; position: relative; }
        .checker { width: 28px; height: 28px; border-radius: 50%; position: absolute; }
        .white { background: white; }
        .black { background: black; }
    </style>
</head>
<body>
    <h1>Backgammon Game</h1>
    <div class="board">
        <!-- Points in Backgammon: Each cell will represent a point on the board -->
        <div class="point" id="p0"></div>
        <div class="point" id="p1"></div>
        <div class="point" id="p2"></div>
        <div class="point" id="p3"></div>
        <div class="point" id="p4"></div>
        <div class="point" id="p5"></div>
        <div class="point" id="p6"></div>
        <div class="point" id="p7"></div>
        <div class="point" id="p8"></div>
        <div class="point" id="p9"></div>
        <div class="point" id="p10"></div>
        <div class="point" id="p11"></div>
        <div class="point" id="p12"></div>
        <div class="point" id="p13"></div>
        <div class="point" id="p14"></div>
        <div class="point" id="p15"></div>
        <div class="point" id="p16"></div>
        <div class="point" id="p17"></div>
        <div class="point" id="p18"></div>
        <div class="point" id="p19"></div>
        <div class="point" id="p20"></div>
        <div class="point" id="p21"></div>
        <div class="point" id="p22"></div>
        <div class="point" id="p23"></div>
    </div>
    <script>
        const board = [
            [], [], [], [], [], [], [], [], [], [], [], [], [], [], [], [], [], [], [], [], [], [], [], []
        ];
        let currentPlayer = 'black';

        function initializeCheckers() {
            // Initialize checkers for both players
            const startingPositions = [2, 0, 0, 0, 0, 0, 0, 0];
            for (let i = 0; i < 2; i++) {
                for (let j = 0; j < startingPositions.length; j++) {
                    for (let k = 0; k < startingPositions[i]; k++) {
                        const checker = document.createElement('div');
                        checker.className = 'checker ' + (i === 0 ? 'black' : 'white');
                        board[j].push(checker);
                        document.getElementById('p' + j).appendChild(checker);
                    }
                }
            }
        }

        function switchPlayer() {
            currentPlayer = (currentPlayer === 'black') ? 'white' : 'black';
        }

        // Call this function to initiate the game
        initializeCheckers();
    </script>
</body>
</html>
